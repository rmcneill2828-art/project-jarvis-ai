name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: pytest -q
      - run: python scripts/validate_repository.py
      # Advisory only until an initial findings baseline has been triaged -
      # see the "gap analysis" review that introduced this step.
      - run: pip-audit
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      # --omit=dev: vite/esbuild (the only two current findings) are
      # build-tool devDependencies never present in the shipped `dist/`
      # bundle - their advisories (GHSA-67mh-4wv8-2f99, GHSA-fx2h-pf6j-xcff)
      # describe attacks on a locally running `vite dev` server, not the
      # packaged app. `npm audit --omit=dev` confirmed 0 vulnerabilities
      # against the real shipped dependency set (EIP-ESR0032-002), so this
      # is a real hard gate, not an advisory placeholder.
      - run: npm audit --audit-level=high --omit=dev

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri's own documented Linux build prerequisites (EIP-ESR0032-002,
      # verified via a real WSL Ubuntu build before this job was written).
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev \
            libgtk-3-dev librsvg2-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      # Tauri's generate_context!() macro requires the externalBin sidecar
      # to exist at compile time regardless of build profile - a plain
      # `cargo build`/`clippy`/`test` fails without it, not just `tauri build`.
      - run: python scripts/build_backend_sidecar.py
      - run: cargo build --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml
